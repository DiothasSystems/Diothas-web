name: Build and deploy to Hostinger

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Never let two deploys race each other onto the same FTP account.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Hoisted so the deploy step can test whether the secrets exist. The
    # `secrets` context is not usable in every `if:`; the `env` context is.
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # build.js exits non-zero on invalid front matter, an impossible date,
      # an unknown status, or a missing image. A failed build never deploys.
      - name: Build
        run: npm run build

      # Until the FTP secrets exist, the build alone is the whole job. Without
      # this guard the first push to a fresh repo fails on empty credentials.
      - name: Deploy skipped — no FTP credentials
        if: github.event_name != 'pull_request' && env.FTP_SERVER == ''
        run: |
          echo "::warning::Built successfully but did not deploy. Add FTP_SERVER, FTP_USERNAME and FTP_PASSWORD under Settings → Secrets and variables → Actions, then re-run this workflow."

      # Pull requests stop here: the build is the test.
      - name: Deploy via FTPS
        if: github.event_name != 'pull_request' && env.FTP_SERVER != ''
        # v4.4.0 runs on node24. v4.3.5 declared node20, which GitHub deprecated.
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ${{ vars.FTP_REMOTE_DIR || '/public_html/' }}
          # Incremental. The action keeps a manifest on the server and uploads
          # only what changed. Never enable dangerous-clean-slate here.
          dangerous-clean-slate: false
